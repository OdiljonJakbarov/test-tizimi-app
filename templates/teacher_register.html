<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ro'yxatdan o'tish</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#1a3a6b,#2563b0);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:white;border-radius:16px;padding:40px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.logo{text-align:center;margin-bottom:28px;}
.logo h1{font-size:22px;color:#1a3a6b;font-weight:700;}
.logo p{color:#666;font-size:13px;margin-top:5px;}
.avatar{width:64px;height:64px;background:linear-gradient(135deg,#27ae60,#2ecc71);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;}
.form-group{margin-bottom:15px;}
label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:5px;}
input{width:100%;padding:11px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;}
input:focus{border-color:#2563b0;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#27ae60,#2ecc71);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;}
.btn:hover{opacity:.9;}
.error{background:#fdf2f2;color:#c0392b;border:1px solid #f5b7b1;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;}
.links{text-align:center;margin-top:16px;font-size:13px;color:#666;}
.links a{color:#2563b0;text-decoration:none;font-weight:600;}
.hint{font-size:11px;color:#999;margin-top:4px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="avatar">✏️</div>
    <h1>Ro'yxatdan O'tish</h1>
    <p>O'qituvchi akkaunti yaratish</p>
  </div>
  {% if error %}
  <div class="error">❌ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>To'liq ism (F.I.O.)</label>
      <input type="text" name="name" placeholder="Masalan: Karimov Alisher" required autofocus />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Login (username)</label>
        <input type="text" name="username" placeholder="alisher_karimov" required />
        <div class="hint">Faqat lotin harflari va _ belgisi</div>
      </div>
      <div class="form-group">
        <label>Email (ixtiyoriy)</label>
        <input type="email" name="email" placeholder="email@gmail.com" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Parol</label>
        <input type="password" name="password" placeholder="kamida 6 belgi" required />
      </div>
      <div class="form-group">
        <label>Parolni takrorlang</label>
        <input type="password" name="password2" placeholder="••••••" required />
      </div>
    </div>
    <button type="submit" class="btn">✅ Ro'yxatdan o'tish</button>
  </form>
  <div class="links">
    Allaqachon akkaunt bormi? <a href="/teacher/login">Kirish</a>
    <br><br><a href="/">← Talaba sahifasi</a>
  </div>
</div>
</body>
</html>
