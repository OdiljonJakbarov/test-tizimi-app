<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'qituvchi — Kirish</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#1a3a6b,#2563b0);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:white;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.logo{text-align:center;margin-bottom:28px;}
.logo h1{font-size:22px;color:#1a3a6b;font-weight:700;}
.logo p{color:#666;font-size:13px;margin-top:5px;}
.avatar{width:64px;height:64px;background:linear-gradient(135deg,#1a3a6b,#2563b0);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;}
.form-group{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:5px;}
input{width:100%;padding:11px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;}
input:focus{border-color:#2563b0;}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#1a3a6b,#2563b0);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;}
.btn:hover{opacity:.9;}
.error{background:#fdf2f2;color:#c0392b;border:1px solid #f5b7b1;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;}
.links{text-align:center;margin-top:18px;font-size:13px;color:#666;}
.links a{color:#2563b0;text-decoration:none;font-weight:600;}
.divider{text-align:center;margin:16px 0;color:#aaa;font-size:12px;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#e0e0e0;}
.divider::before{left:0}.divider::after{right:0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="avatar">👨‍🏫</div>
    <h1>O'qituvchi Kabineti</h1>
    <p>Test tizimiga kirish</p>
  </div>
  {% if error %}
  <div class="error">❌ {{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Login (username)</label>
      <input type="text" name="username" placeholder="loginингизни киринг" required autofocus />
    </div>
    <div class="form-group">
      <label>Parol</label>
      <input type="password" name="password" placeholder="••••••••" required />
    </div>
    <button type="submit" class="btn">🔐 Kirish</button>
  </form>
  <div class="divider">yoki</div>
  <div class="links">
    Akkaunt yo'qmi? <a href="/teacher/register">Ro'yxatdan o'tish</a>
    <br><br>
    <a href="/">← Talaba sahifasi</a>
  </div>
</div>
</body>
</html>
